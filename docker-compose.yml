services:
  postgres:
    image: postgres:16-alpine
    container_name: summitquest-postgres
    environment:
      POSTGRES_USER: summitquest
      POSTGRES_PASSWORD: summitquest
      POSTGRES_DB: summitquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summitquest -d summitquest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: summitquest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: summitquest-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://summitquest:summitquest@postgres:5432/summitquest
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
