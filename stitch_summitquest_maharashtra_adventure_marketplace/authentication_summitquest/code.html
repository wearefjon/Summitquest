<!-- Login Form -->
<form class="space-y-6">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface-off-white border-outline-variant rounded-[16px] py-3 pl-12 pr-4 focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow font-body-md text-body-md placeholder-outline/60 text-on-surface" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-off-white border-outline-variant rounded-[16px] py-3 pl-12 pr-4 focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow font-body-md text-body-md placeholder-outline/60 text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-secondary focus:ring-secondary bg-surface-off-white" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-md text-label-md text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-[16px] shadow-sm font-label-md text-label-md text-on-primary bg-secondary hover:bg-primary transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">

</div>
